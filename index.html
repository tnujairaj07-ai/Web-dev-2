<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1>Async Weather Tracker</h1>
        
        <div class="main-content">
            <!-- Search Panel -->
            <div class="panel">
                <h2>Search City</h2>
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="Enter city name">
                    <button id="searchBtn">Search</button>
                </div>
                <div id="historyList" class="history-list"></div>
            </div>

             <!-- Weather Panel -->
            <div class="panel">
                <h2>Weather Info</h2>
                <div id="weatherInfo">
                    <div id="errorMsg" class="error">
                        City Not Found
                    </div>
                    <div id="weatherContent"></div>
                </div>
            </div>
        </div>

        <!-- Console Panel -->
        <div class="panel">
            <h2>Console - Event Loop</h2>
            <div id="console" class="console"></div>
        </div>
    </div>
</body>
</html>
